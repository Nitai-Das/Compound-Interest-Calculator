<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Compound Interest Calculator</title>
</head>

<body>
    <div class="container">

        <div class="center">
            <div class="cards">
                <form action="">
                    <h3>Compound Interest Calculator</h3>
                    <input type="number" id="principle" min="1" required placeholder="Enter principle amount: ">
                    <input type="number" id="rate" min="0" required placeholder="Enter interest rate: ">
                    <input type="number" id="years" min="1" required placeholder="Enter amount of years: ">

                    <div class="btn">
                        <button id="btn">Calculate</button>
                        <button type="reset" id="clear">Clear</button>
                    </div>

                    <div class="result">
                        <p id="result"></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>
